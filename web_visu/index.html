<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/kitkurs/">
    <title>Course Catalog</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-graduation-cap"></i> Course Catalog</h1>
            <p>Browse and filter engineering courses with detailed information</p>
            <nav class="main-nav">
                <a href="index.html" class="nav-link active">
                    <i class="fas fa-th-large"></i> Course Catalog
                </a>
                <a href="planner.html" class="nav-link">
                    <i class="fas fa-calendar-alt"></i> Planner
                </a>
                <button class="add-custom-course-btn" onclick="courseCatalog.openCustomCourseModal()">
                    <i class="fas fa-plus-circle"></i> Add Custom Course
                </button>
            </nav>
        </header>

        <div class="controls">
            <div class="filters">
                <div class="filter-group">
                    <label for="categoryFilter">Category:</label>
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="semesterFilter">Semester:</label>
                    <select id="semesterFilter">
                        <option value="">All Semesters</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="fosFilter">Field of Specialization:</label>
                    <select id="fosFilter">
                        <option value="">All Specializations</option>
                    </select>
                </div>

                <div class="filter-group availability-filter-group">
                    <label>Course Types:</label>
                    <div class="availability-filters">
                        <div class="fos-categories-section">
                            <div class="section-header">
                                <h4>FoS Course Types (60 CP):</h4>
                                <button class="toggle-all-btn" onclick="courseCatalog.toggleAll('fosCategory')">
                                    <i class="fas fa-check-square"></i> Toggle All
                                </button>
                            </div>
                            <div id="fosCategoriesCheckboxes" class="checkbox-container">
                                <!-- FoS category checkboxes will be populated by JavaScript -->
                            </div>
                        </div>
                        
                        <div class="general-section">
                            <div class="section-header">
                                <h4>Program Components:</h4>
                                <button class="toggle-all-btn" onclick="courseCatalog.toggleAll('general')">
                                    <i class="fas fa-check-square"></i> Toggle All
                                </button>
                            </div>
                            <div id="generalCheckboxes" class="checkbox-container">
                                <!-- General checkboxes will be populated by JavaScript -->
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="results-info">
            <span id="resultsCount">Loading courses...</span>
            <div class="filter-toggles">
                <div class="favorites-toggle">
                    <input type="checkbox" id="showFavoritesOnly" />
                    <label for="showFavoritesOnly">
                        <i class="fas fa-star"></i> Show favorites only
                    </label>
                </div>
                <div class="favorites-toggle">
                    <input type="checkbox" id="hideNotInterested" />
                    <label for="hideNotInterested">
                        <i class="fas fa-eye-slash"></i> Hide not interested
                    </label>
                </div>
            </div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search courses...">
            </div>
        </div>

        <div class="courses-grid" id="coursesGrid">
            <!-- Courses will be dynamically loaded here -->
        </div>

        <div class="no-results" id="noResults" style="display: none;">
            <i class="fas fa-search"></i>
            <h3>No courses found</h3>
            <p>Try adjusting your search criteria or filters</p>
        </div>
    </div>

    <!-- PDF Viewer Modal -->
    <div id="pdfModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="pdfTitle">Course Information</h3>
                <button class="close-btn" id="closePdfModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <iframe id="pdfViewer" src="" width="100%" height="600px"></iframe>
            </div>
        </div>
    </div>

    <!-- Custom Course Modal -->
    <div id="customCourseModal" class="modal">
        <div class="modal-content custom-course-modal">
            <div class="modal-header">
                <h3 id="customCourseModalTitle">Add Custom Course</h3>
                <button class="close-btn" onclick="courseCatalog.closeCustomCourseModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="customCourseForm" onsubmit="event.preventDefault(); courseCatalog.saveCustomCourse();">
                    <div class="form-group">
                        <label for="courseName">Course Name *</label>
                        <input type="text" id="courseName" required placeholder="e.g., Advanced Machine Learning">
                    </div>

                    <div class="form-group">
                        <label for="courseEcts">ECTS Credits *</label>
                        <input type="number" id="courseEcts" min="1" max="30" required placeholder="e.g., 6">
                    </div>

                    <div class="form-group">
                        <label for="courseSemester">Semester *</label>
                        <select id="courseSemester" required>
                            <option value="">Select semester</option>
                            <option value="WS">Winter Semester (WS)</option>
                            <option value="SS">Summer Semester (SS)</option>
                            <option value="WS/SS">Both Semesters (WS/SS)</option>
                            <option value="Irregular">Irregular</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="courseCategory">Category *</label>
                        <select id="courseCategory" required>
                            <option value="">Select category</option>
                            <option value="thesis">Master's Thesis</option>
                            <option value="electiveArea">Elective Area</option>
                            <option value="general">FoS - General</option>
                            <option value="additive">FoS - Additive</option>
                            <option value="methodical">FoS - Methodical</option>
                            <option value="interdisciplinary">Interdisciplinary</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="courseCatalog.closeCustomCourseModal()">
                            Cancel
                        </button>
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save"></i> Save Course
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/js/simple-modular.js"></script>
</body>
</html>
